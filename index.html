<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🀄 麻将学习坊 — Mahjong Learning</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d2818;--card:#1a3d28;--card2:#2d5a3d;--text:#e8f0e8;--text2:#a0b8a0;
  --accent:#4ade80;--accent2:#22c55e;--green:#4ade80;--red:#f87171;--gold:#fbbf24;
  --tile-w:64px;--tile-h:88px;--radius:12px;
  --felt:#1a5c2a;--felt2:#164a22;
}
body{font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei','Noto Sans SC','Noto Sans JP','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:1200px;margin:0 auto;padding:20px}

/* Header */
.header{text-align:center;padding:32px 0 24px}
.header h1{font-size:2.4rem;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header p{color:var(--text2);margin-top:8px;font-size:1rem}

/* Lang Switcher */
.lang-bar{display:flex;justify-content:center;align-items:center;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.lang-bar span{color:var(--text2);font-size:0.85rem}
.lang-btn{padding:6px 12px;border-radius:6px;border:1px solid var(--card2);background:var(--card);color:var(--text2);cursor:pointer;font-size:0.82rem;transition:all .2s;font-family:inherit}
.lang-btn:hover{border-color:var(--accent);color:var(--accent)}
.lang-btn.active{background:var(--accent);color:var(--bg);border-color:var(--accent);font-weight:600}

/* Nav Tabs */
.nav{display:flex;gap:4px;justify-content:center;margin-bottom:24px;flex-wrap:wrap}
.nav-btn{padding:10px 24px;border-radius:8px;border:1px solid var(--card2);background:var(--card);color:var(--text2);cursor:pointer;font-size:0.95rem;transition:all .2s;font-family:inherit}
.nav-btn:hover{border-color:var(--accent);color:var(--accent)}
.nav-btn.active{background:var(--accent);color:var(--bg);border-color:var(--accent);font-weight:600}

/* Panel */
.panel{display:none}
.panel.active{display:block}
.card{background:var(--card);border-radius:var(--radius);padding:24px;margin-bottom:16px;border:1px solid var(--card2)}

/* === TILE GALLERY === */
.tile-section{margin-bottom:28px}
.tile-section h3{font-size:1.15rem;margin-bottom:14px;color:var(--accent);display:flex;align-items:center;gap:8px}
.tile-grid{display:flex;flex-wrap:wrap;gap:8px}
.tile{width:var(--tile-w);height:var(--tile-h);border-radius:6px;background:linear-gradient(170deg,#fffef7 0%,#faf7ed 25%,#f0ead8 100%);border:2.5px solid #e8dcc8;display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:700;cursor:pointer;transition:all .18s;position:relative;box-shadow:0 3px 8px rgba(0,0,0,.22),0 1px 2px rgba(0,0,0,.1),inset 0 1px 0 rgba(255,255,255,.8);color:#1a2744;letter-spacing:0;font-family:'PingFang SC','Hiragino Sans GB','Noto Serif SC','KaiTi',serif}
.tile:hover{transform:translateY(-5px);box-shadow:0 8px 22px rgba(0,0,0,.35),0 2px 4px rgba(0,0,0,.15),inset 0 1px 0 rgba(255,255,255,.8);z-index:10}
.tile.bamboo{color:#1a3a6b}
.tile.char{color:#1a2744}
.tile.dot{color:#1a3a6b}
.tile.wind{color:#1a2744}
.tile.dragon{color:#1a2744}
.tile .corner{position:absolute;top:3px;left:5px;font-size:0.5rem;font-weight:600;opacity:.55;line-height:1;color:#6b8098}
.tile .label{position:absolute;bottom:2px;font-size:0.5rem;color:#8b8b7a;white-space:nowrap;max-width:60px;overflow:hidden;text-overflow:ellipsis;font-weight:400}
.tile.selected{border-color:var(--accent);box-shadow:0 0 0 3px rgba(74,222,128,.5),0 6px 16px rgba(0,0,0,.25),inset 0 1px 0 rgba(255,255,255,.8)}

/* === RULES === */
.rule-block{margin-bottom:20px}
.rule-block h4{font-size:1.05rem;margin-bottom:8px;color:var(--gold)}
.rule-block p,.rule-block li{color:var(--text2);line-height:1.7;font-size:0.95rem}
.rule-block ul{padding-left:20px;margin-top:6px}
.rule-block li{margin-bottom:4px}
.highlight{background:rgba(74,222,128,.12);padding:2px 6px;border-radius:4px;font-weight:600;color:var(--gold)}

/* === HAND BUILDER === */
.builder-area{min-height:200px}
.hand-zone{border:2px dashed rgba(255,255,255,.1);border-radius:var(--radius);padding:16px;min-height:110px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;justify-content:center;margin-bottom:16px;background:rgba(0,0,0,.15)}
.hand-zone-label{font-size:0.8rem;color:var(--text2);text-align:center;margin-bottom:6px}
.hand-tile{width:52px;height:72px;border-radius:5px;background:linear-gradient(170deg,#fffef7 0%,#faf7ed 25%,#f0ead8 100%);border:2px solid #e8dcc8;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:700;cursor:pointer;position:relative;box-shadow:0 2px 6px rgba(0,0,0,.18),0 1px 2px rgba(0,0,0,.08),inset 0 1px 0 rgba(255,255,255,.7);transition:all .15s;color:#1a2744;font-family:'PingFang SC','Hiragino Sans GB','Noto Serif SC','KaiTi',serif}
.hand-tile:hover{transform:translateY(-4px);box-shadow:0 6px 16px rgba(0,0,0,.3),0 2px 4px rgba(0,0,0,.12),inset 0 1px 0 rgba(255,255,255,.7)}
.hand-tile.bamboo{color:#1a3a6b}
.hand-tile.char{color:#1a2744}
.hand-tile.dot{color:#1a3a6b}
.hand-tile.wind{color:#1a2744}
.hand-tile.dragon{color:#1a2744}
.hand-tile .corner{position:absolute;top:2px;left:4px;font-size:0.45rem;font-weight:600;opacity:.5;line-height:1;color:#6b8098}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:12px}
.btn{padding:8px 20px;border-radius:8px;border:none;cursor:pointer;font-size:0.9rem;font-family:inherit;transition:all .2s;font-weight:500}
.btn-primary{background:var(--accent);color:var(--bg)}
.btn-primary:hover{opacity:.85}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{opacity:.85}
.btn-outline{border:1px solid var(--card2);background:transparent;color:var(--text2)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.result-box{padding:14px;border-radius:8px;margin-top:12px;text-align:center;font-weight:600;font-size:1rem}
.result-win{background:rgba(74,222,128,.15);color:var(--green)}
.result-lose{background:rgba(248,113,113,.15);color:var(--red)}
.result-hint{background:rgba(56,189,248,.1);color:var(--accent)}

/* === QUIZ === */
.quiz-card{text-align:center}
.quiz-question{font-size:1.2rem;margin-bottom:20px;font-weight:500}
.quiz-options{display:grid;gap:10px;max-width:500px;margin:0 auto 16px}
.quiz-option{padding:12px 20px;border-radius:8px;border:2px solid var(--card2);background:var(--card);color:var(--text);cursor:pointer;font-size:0.95rem;transition:all .2s;text-align:left;font-family:inherit}
.quiz-option:hover{border-color:var(--accent)}
.quiz-option.correct{border-color:var(--green);background:rgba(74,222,128,.1);color:var(--green)}
.quiz-option.wrong{border-color:var(--red);background:rgba(248,113,113,.1);color:var(--red)}
.quiz-score{font-size:1.1rem;margin-top:12px;color:var(--gold)}
.quiz-feedback{margin-top:12px;font-size:0.95rem;color:var(--text2)}

/* Responsive */
@media(max-width:768px){
  :root{--tile-w:48px;--tile-h:66px}
  .hand-tile{width:44px;height:60px;font-size:0.9rem}
  .tile{font-size:1.05rem}
  .nav-btn{padding:8px 16px;font-size:0.85rem}
  .header h1{font-size:1.8rem}
}

/* === GAME === */
.game-table{display:grid;grid-template-areas:"top top top" "left center right" "bottom bottom bottom";grid-template-columns:120px 1fr 120px;grid-template-rows:auto 1fr auto;gap:10px;min-height:600px;background:radial-gradient(ellipse at center,var(--felt) 0%,var(--felt2) 100%);border-radius:16px;padding:16px;border:4px solid #3d2613;box-shadow:inset 0 0 80px rgba(0,0,0,.3),0 4px 20px rgba(0,0,0,.5)}
.game-opp{background:rgba(0,0,0,.25);border-radius:var(--radius);padding:12px;text-align:center;border:1px solid rgba(255,255,255,.08);display:flex;flex-direction:column;align-items:center;gap:6px;backdrop-filter:blur(4px)}
.game-opp-name{font-weight:600;font-size:0.9rem;color:var(--accent)}
.game-opp-tiles{display:flex;flex-wrap:wrap;gap:2px;justify-content:center;max-width:100%}
.game-opp-tiles .mini-tile{width:28px;height:20px;border-radius:3px;background:linear-gradient(135deg,#1e40af,#3b82f6);opacity:.8}
.game-opp-tiles .mini-tile.pungged{background:linear-gradient(135deg,#92400e,#d4a853);border:1px solid #d4a853;display:flex;align-items:center;justify-content:center;font-size:0.65rem;color:#78350f;width:auto;padding:0 2px}
.game-player-area{background:rgba(0,0,0,.3);border-radius:var(--radius);padding:16px;border:2px solid var(--accent);backdrop-filter:blur(4px)}
.game-player-name{font-weight:600;font-size:0.9rem;color:var(--accent);margin-bottom:8px}
.game-player-hand{display:flex;flex-wrap:wrap;gap:4px;min-height:74px;align-items:center;justify-content:center}
.game-player-hand .game-tile{width:48px;height:66px;border-radius:5px;background:linear-gradient(170deg,#fffef7 0%,#faf7ed 25%,#f0ead8 100%);border:2px solid #e8dcc8;display:flex;align-items:center;justify-content:center;font-size:0.95rem;font-weight:700;cursor:pointer;position:relative;box-shadow:0 2px 6px rgba(0,0,0,.2),0 1px 2px rgba(0,0,0,.08),inset 0 1px 0 rgba(255,255,255,.7);transition:all .15s;color:#1a2744;font-family:'PingFang SC','Hiragino Sans GB','Noto Serif SC','KaiTi',serif}
.game-player-hand .game-tile:hover{transform:translateY(-6px);box-shadow:0 6px 18px rgba(0,0,0,.3),0 2px 4px rgba(0,0,0,.15),inset 0 1px 0 rgba(255,255,255,.7)}
.game-player-hand .game-tile.selected-tile{border-color:var(--red);box-shadow:0 0 0 3px rgba(248,113,113,.5),0 6px 18px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.7);transform:translateY(-6px)}
.game-player-hand .game-tile.bamboo{color:#1a3a6b}
.game-player-hand .game-tile.char{color:#1a2744}
.game-player-hand .game-tile.dot{color:#1a3a6b}
.game-player-hand .game-tile.wind{color:#1a2744}
.game-player-hand .game-tile.dragon{color:#1a2744}
.game-player-hand .game-tile .corner{position:absolute;top:2px;left:3px;font-size:0.4rem;font-weight:600;opacity:.5;line-height:1;color:#6b8098}
.game-player-hand .game-tile .g-label{position:absolute;bottom:1px;font-size:0.4rem;color:#8b8b7a;font-weight:400}
.game-center{grid-area:center;display:flex;flex-direction:column;align-items:center;gap:10px}
.game-discards{display:flex;flex-wrap:wrap;gap:3px;justify-content:center;padding:10px;background:rgba(0,0,0,.2);border-radius:var(--radius);min-height:50px;align-items:center;border:1px solid rgba(255,255,255,.06);backdrop-filter:blur(4px)}
.game-dtile{width:40px;height:54px;border-radius:4px;background:linear-gradient(170deg,#fffef7 0%,#faf7ed 25%,#f0ead8 100%);border:1.5px solid #e8dcc8;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;opacity:.9;color:#1a2744;box-shadow:0 1px 3px rgba(0,0,0,.15),inset 0 1px 0 rgba(255,255,255,.6);font-family:'PingFang SC','Hiragino Sans GB','Noto Serif SC','KaiTi',serif}
.game-info{color:var(--gold);font-size:0.9rem;font-weight:600;text-align:center;text-shadow:0 1px 3px rgba(0,0,0,.5)}
.game-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:8px}
.game-actions .btn{padding:6px 14px;font-size:0.8rem}
.game-drawn{width:48px;height:66px;border-radius:5px;background:linear-gradient(170deg,#fffef7 0%,#faf7ed 25%,#f0ead8 100%);border:2px solid var(--green);display:flex;align-items:center;justify-content:center;font-size:0.95rem;font-weight:700;box-shadow:0 2px 10px rgba(74,222,128,.4),inset 0 1px 0 rgba(255,255,255,.7);color:#1a2744;font-family:'PingFang SC','Hiragino Sans GB','Noto Serif SC','KaiTi',serif;animation:pulse-glow 1.5s ease-in-out infinite}
@keyframes pulse-glow{0%,100%{box-shadow:0 2px 10px rgba(74,222,128,.4),inset 0 1px 0 rgba(255,255,255,.7)}50%{box-shadow:0 4px 18px rgba(74,222,128,.6),inset 0 1px 0 rgba(255,255,255,.7)}}
.game-opp-melds{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin-top:4px}
.game-meld{display:flex;gap:1px;padding:2px 4px;border-radius:4px;background:rgba(212,168,83,.2);border:1px solid #d4a853;font-size:0.7rem;color:var(--text2)}
.game-meld span{margin:0 1px}
#game-top{grid-area:top}#game-left{grid-area:left}#game-right{grid-area:right}#game-bottom{grid-area:bottom}
#game-left .game-opp-tiles{flex-direction:column}
#game-right .game-opp-tiles{flex-direction:column}
.game-draw-btn{margin-top:8px}

@media(max-width:768px){
  .game-table{grid-template-columns:60px 1fr 60px}
  .game-player-hand .game-tile{width:36px;height:50px;font-size:0.9rem}
  .game-dtile{width:30px;height:40px;font-size:0.75rem}
  .game-drawn{width:36px;height:50px;font-size:0.9rem}
  .game-opp-tiles .mini-tile{width:20px;height:14px}
}
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <h1 data-i18n="appTitle">🀄 麻将学习坊</h1>
    <p data-i18n="appDesc">零基础入门 · 牌型识别 · 手牌练习 · 趣味测验</p>
  </div>

  <!-- Language Switcher -->
  <div class="lang-bar">
    <span>🌐</span>
    <button class="lang-btn active" data-lang="zh">中文</button>
    <button class="lang-btn" data-lang="en">English</button>
    <button class="lang-btn" data-lang="fr">Français</button>
    <button class="lang-btn" data-lang="it">Italiano</button>
    <button class="lang-btn" data-lang="es">Español</button>
    <button class="lang-btn" data-lang="de">Deutsch</button>
    <button class="lang-btn" data-lang="ko">한국어</button>
    <button class="lang-btn" data-lang="ja">日本語</button>
  </div>

  <!-- Navigation -->
  <nav class="nav">
    <button class="nav-btn active" data-panel="gallery" data-i18n="navGallery">🀫 牌型认知</button>
    <button class="nav-btn" data-panel="rules" data-i18n="navRules">📖 规则讲解</button>
    <button class="nav-btn" data-panel="builder" data-i18n="navBuilder">🧩 手牌搭建</button>
    <button class="nav-btn" data-panel="quiz" data-i18n="navQuiz">🎯 趣味测验</button>
    <button class="nav-btn" data-panel="play" data-i18n="navPlay">🎮 对局</button>
  </nav>

  <!-- Panel: Gallery -->
  <div class="panel active" id="panel-gallery">
    <div class="card">
      <p style="color:var(--text2);margin-bottom:16px" data-i18n="galleryHint">点击任意麻将牌可查看名称，选中的牌可加入下方的手牌区域进行练习。</p>
    </div>
    <div id="gallery-content"></div>
  </div>

  <!-- Panel: Play Game -->
  <div class="panel" id="panel-play">
    <div class="card" style="text-align:center">
      <p style="color:var(--text2);margin-bottom:8px" data-i18n="playHint"></p>
      <button class="btn btn-primary" onclick="startGame()" id="btn-start-game" data-i18n="btnStartGame">🎮 开始新对局</button>
    </div>
    <div class="game-table" id="game-table" style="display:none">
      <div class="game-opp" id="game-top">
        <div class="game-opp-name" id="opp-name-top">🤖 东家</div>
        <div class="game-opp-melds" id="opp-melds-top"></div>
        <div class="game-opp-tiles" id="opp-tiles-top"></div>
      </div>
      <div class="game-opp" id="game-left">
        <div class="game-opp-name" id="opp-name-left">🤖 北家</div>
        <div class="game-opp-melds" id="opp-melds-left"></div>
        <div class="game-opp-tiles" id="opp-tiles-left"></div>
      </div>
      <div class="game-opp" id="game-right">
        <div class="game-opp-name" id="opp-name-right">🤖 南家</div>
        <div class="game-opp-melds" id="opp-melds-right"></div>
        <div class="game-opp-tiles" id="opp-tiles-right"></div>
      </div>
      <div class="game-center">
        <div class="game-info" id="game-info"></div>
        <div class="game-discards" id="game-discards">
          <span style="color:var(--text2);font-size:0.85rem" data-i18n="discardHint">弃牌区</span>
        </div>
        <div class="game-actions" id="game-actions"></div>
      </div>
      <div class="game-player-area" id="game-bottom">
        <div class="game-player-name">🧑 你的手牌</div>
        <div style="display:flex;align-items:flex-start;gap:10px;justify-content:center;flex-wrap:wrap">
          <div class="game-player-hand" id="player-hand"></div>
          <div id="player-drawn" style="display:none"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Panel: Rules -->
  <div class="panel" id="panel-rules">
    <div class="card rule-block">
      <h4 data-i18n="rulesCompTitle">🀄 麻将基本构成</h4>
      <div data-i18n="rulesComp"></div>
    </div>
    <div class="card rule-block">
      <h4 data-i18n="rulesWinTitle">🏆 胡牌条件</h4>
      <div data-i18n="rulesWin"></div>
    </div>
    <div class="card rule-block">
      <h4 data-i18n="rulesFlowTitle">🎲 基本游戏流程</h4>
      <div data-i18n="rulesFlow"></div>
    </div>
    <div class="card rule-block">
      <h4 data-i18n="rulesActionsTitle">🎯 特殊动作</h4>
      <div data-i18n="rulesActions"></div>
    </div>
    <div class="card rule-block">
      <h4 data-i18n="rulesFansTitle">📊 番型简介（简版）</h4>
      <div data-i18n="rulesFans"></div>
    </div>
  </div>

  <!-- Panel: Hand Builder -->
  <div class="panel" id="panel-builder">
    <div class="card">
      <p style="color:var(--text2);margin-bottom:12px" data-i18n="builderHint"></p>
      <div class="hand-zone-label" data-i18n="handZoneLabel">👇 你的手牌（0/14）</div>
      <div class="hand-zone" id="hand-zone">
        <span style="color:var(--text2);font-size:0.9rem" id="hand-empty-hint" data-i18n="handEmptyHint">点击下方牌库中的牌来添加手牌 🀫</span>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="checkWin()" data-i18n="btnCheck">🔍 判定胡牌</button>
        <button class="btn btn-outline" onclick="sortHand()" data-i18n="btnSort">📐 排序</button>
        <button class="btn btn-danger" onclick="clearHand()" data-i18n="btnClear">🗑 清空</button>
      </div>
      <div id="hand-result"></div>
    </div>
    <div class="card">
      <h3 style="color:var(--accent);margin-bottom:12px" data-i18n="tilePoolTitle">牌库 — 点击选牌</h3>
      <div id="builder-tile-pool"></div>
    </div>
  </div>

  <!-- Panel: Quiz -->
  <div class="panel" id="panel-quiz">
    <div class="card quiz-card">
      <div class="quiz-score" id="quiz-score"></div>
      <div class="quiz-question" id="quiz-q"></div>
      <div class="quiz-options" id="quiz-opts"></div>
      <div class="quiz-feedback" id="quiz-fb"></div>
      <button class="btn btn-primary" id="quiz-next" style="display:none;margin:12px auto" onclick="nextQuiz()" data-i18n="btnNext">下一题 ▶</button>
    </div>
  </div>

</div>

<script>
// ====== i18n ======
let currentLang = 'zh';

const I18N = {
  zh: {
    appTitle: '🀄 麻将学习坊',
    appDesc: '零基础入门 · 牌型识别 · 手牌练习 · 趣味测验',
    navGallery: '🀫 牌型认知',
    navRules: '📖 规则讲解',
    navBuilder: '🧩 手牌搭建',
    navQuiz: '🎯 趣味测验',
    galleryHint: '点击任意麻将牌可查看名称，选中的牌可加入下方的手牌区域进行练习。',
    suitWan: '万子 (Characters)',
    suitTong: '筒子 (Dots)',
    suitTiao: '条子 (Bamboo)',
    suitWind: '风牌 (Winds)',
    suitDragon: '箭牌 (Dragons)',
    rulesCompTitle: '🀄 麻将基本构成',

// ====== TILE DATA ======
// face: main character displayed on tile
// corner: small suit marker in top-left
const TILES = [];
const suits = [
  {name:'万', cls:'char', chars:['一','二','三','四','五','六','七','八','九']},
  {name:'筒', cls:'dot', chars:['一','二','三','四','五','六','七','八','九']},
  {name:'条', cls:'bamboo', chars:['一','二','三','四','五','六','七','八','九']},
];
const windChars = ['東','南','西','北'];
const dragonChars = ['中','發','白'];
const windNames = ['东','南','西','北'];
const dragonNames = ['中','发','白'];

let id=0;
suits.forEach((s,suitIdx)=>{
  for(let n=1;n<=9;n++){
    TILES.push({id:id++,key:`${n}${s.name}`, suit:suitIdx, num:n,
      face:`${s.chars[n-1]}${s.name}`, corner:s.name, cls:s.cls, type:'suit'});
  }
});
windNames.forEach((w,i)=>{
  TILES.push({id:id++,key:w, suit:-1, num:i,
    face:windChars[i], corner:'', cls:'wind', type:'wind'});
});
dragonNames.forEach((d,i)=>{
  TILES.push({id:id++,key:d, suit:-1, num:i+31,
    face:dragonChars[i], corner:'', cls:'dragon', type:'dragon'});
});

// ====== STATE ======
let hand = [];
let quizIdx = 0, quizScore = 0, quizTotal = 0, quizAnswered = false;

// ====== i18n helpers ======
function t(key) {
  return I18N[currentLang][key] || I18N['zh'][key] || key;
}
function tileName(key) {
  return I18N[currentLang].tileNames[key] || key;
}

function switchLang(lang) {
  currentLang = lang;
  // Update lang buttons
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
  // Update all data-i18n elements
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    if (el.tagName === 'BUTTON') {
      el.textContent = t(key);
    } else {
      el.innerHTML = t(key);
    }
  });
  // Re-render dynamic content
  renderGallery();
  renderBuilderPool();
  renderHand();
  loadQuiz();
}

// Language button handlers
document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => switchLang(btn.dataset.lang));
});

// ====== GALLERY ======
function renderGallery(){
  const g = document.getElementById('gallery-content');
  let html='';
  suits.forEach((s,i)=>{
    const labels = [t('suitWan'), t('suitTong'), t('suitTiao')];
    html+=`<div class="tile-section"><h3>${'🀇🀙🀐'[i]} ${labels[i]}</h3><div class="tile-grid">`;
    for(let n=1;n<=9;n++){
      const t=TILES.find(x=>x.suit===i&&x.num===n);
      html+=`<div class="tile ${t.cls}" title="${tileName(t.key)}" onclick="addToHand(${t.id})">${t.face}<span class="corner">${t.corner}</span><span class="label">${tileName(t.key)}</span></div>`;
    }
    html+='</div></div>';
  });
  html+=`<div class="tile-section"><h3>🌬️ ${t('suitWind')}</h3><div class="tile-grid">`;
  winds.forEach((w,i)=>{
    const t=TILES.find(x=>x.type==='wind'&&x.num===i);
    html+=`<div class="tile ${t.cls}" title="${tileName(t.key)}" onclick="addToHand(${t.id})">${t.face}<span class="corner">${t.corner}</span><span class="label">${tileName(t.key)}</span></div>`;
  });
  html+='</div></div>';
  html+=`<div class="tile-section"><h3>🐉 ${t('suitDragon')}</h3><div class="tile-grid">`;
  dragons.forEach((d,i)=>{
    const t=TILES.find(x=>x.type==='dragon'&&x.num===i+31);
    html+=`<div class="tile ${t.cls}" title="${tileName(t.key)}" onclick="addToHand(${t.id})">${t.face}<span class="corner">${t.corner}</span><span class="label">${tileName(t.key)}</span></div>`;
  });
  html+='</div></div>';
  g.innerHTML=html;
}

// ====== HAND BUILDER ======
function addToHand(tileId){
  if(hand.length>=14){alert(t('handMaxError'));return;}
  hand.push(tileId);
  renderHand();
}
function removeFromHand(idx){
  hand.splice(idx,1);
  renderHand();
}
function clearHand(){
  hand=[];
  document.getElementById('hand-result').innerHTML='';
  renderHand();
}
function sortHand(){
  hand.sort((a,b)=>{
    const ta=TILES[a], tb=TILES[b];
    if(ta.type!==tb.type) return ta.type==='suit'?-1:ta.type==='wind'?(tb.type==='dragon'?-1:1):1;
    if(ta.type==='suit'){
      if(ta.suit!==tb.suit) return ta.suit-tb.suit;
      return ta.num-tb.num;
    }
    return ta.num-tb.num;
  });
  renderHand();
}
function renderHand(){
  const zone=document.getElementById('hand-zone');
  if(hand.length===0){
    zone.innerHTML=`<span style="color:var(--text2);font-size:0.9rem">${t('handEmptyHint')}</span>`;
  }else{
    zone.innerHTML=hand.map((tid,i)=>{
      const tile=TILES[tid];
      return `<div class="hand-tile ${tile.cls}" title="${tileName(tile.key)}" onclick="removeFromHand(${i})">${tile.face}<span class="corner">${tile.corner}</span><span class="label">${tileName(tile.key)}</span></div>`;
    }).join('');
  }
  document.querySelector('#panel-builder .hand-zone-label').textContent=t('handZoneLabel').replace('{count}',hand.length);
  document.querySelectorAll('.tile').forEach(el=>el.classList.remove('selected'));
  hand.forEach(tid=>{
    const tile=TILES[tid];
    document.querySelectorAll('.tile').forEach(el=>{
      if(el.querySelector('.label')?.textContent===tileName(tile.key))el.classList.add('selected');
    });
  });
}

// ====== WIN CHECK ENGINE ======
function checkWin(){
  document.getElementById('hand-result').innerHTML='';
  if(hand.length!==14){
    document.getElementById('hand-result').innerHTML=`<div class="result-box result-lose">${t('handCountError').replace('{count}',hand.length)}</div>`;
    return;
  }
  const count=new Map();
  hand.forEach(tid=>{
    const tile=TILES[tid];
    const key=tile.type==='suit'?`s${tile.suit}n${tile.num}`:`t${tile.type}v${tile.num}`;
    count.set(key,(count.get(key)||0)+1);
  });
  const keys=Array.from(count.keys());
  for(const pairKey of keys){
    if(count.get(pairKey)<2) continue;
    const remaining=new Map(count);
    const v=remaining.get(pairKey);
    if(v===2) remaining.delete(pairKey);
    else remaining.set(pairKey,v-2);
    if(canFormMelds(remaining,4)){
      document.getElementById('hand-result').innerHTML=`<div class="result-box result-win">${t('handWin')}<br><span style="font-size:0.85rem;font-weight:400;color:var(--text2)">${t('handWinDetail')}</span></div>`;
      return;
    }
  }
  document.getElementById('hand-result').innerHTML=`<div class="result-box result-lose">${t('handLose')}<br><span style="font-size:0.85rem;font-weight:400;color:var(--text2)">${t('handLoseDetail')}</span></div>`;
}

function canFormMelds(remaining, meldCount){
  if(meldCount===0) return remaining.size===0;
  for(const [key,v] of remaining){
    if(v>=3){
      const next=new Map(remaining);
      if(v===3) next.delete(key);
      else next.set(key,v-3);
      if(canFormMelds(next,meldCount-1)) return true;
    }
  }
  for(const [key,v] of remaining){
    if(!key.startsWith('s')) continue;
    const suit=parseInt(key[1]);
    const num=parseInt(key.substring(3));
    const k1=`s${suit}n${num+1}`;
    const k2=`s${suit}n${num+2}`;
    if(remaining.get(k1)>=1 && remaining.get(k2)>=1){
      const next=new Map(remaining);
      decMap(next,key); decMap(next,k1); decMap(next,k2);
      if(canFormMelds(next,meldCount-1)) return true;
    }
  }
  return false;
}

function decMap(m,k){
  const v=m.get(k);
  if(v===1) m.delete(k);
  else m.set(k,v-1);
}

  document.getElementById('quiz-score').textContent=t('quizScore').replace('{score}',quizScore).replace('{total}',quizTotal);

  document.getElementById('quiz-next').style.display='none';
  const opts=document.getElementById('quiz-opts');

}

function answerQuiz(idx){
  if(quizAnswered) return;
  quizAnswered=true;
  quizTotal++;
  const quiz = I18N[currentLang].quiz;
  const item=quiz[quizIdx];
  const btns=document.querySelectorAll('.quiz-option');
  if(idx===item.a){
    quizScore++;
    btns[idx].classList.add('correct');
    document.getElementById('quiz-fb').textContent=t('quizCorrect');
  }else{
    btns[idx].classList.add('wrong');
    btns[item.a].classList.add('correct');
    document.getElementById('quiz-fb').textContent=t('quizWrong');
  }
  document.getElementById('quiz-score').textContent=t('quizScore').replace('{score}',quizScore).replace('{total}',quizTotal);
  document.getElementById('quiz-next').style.display='inline-block';
  btns.forEach(b=>b.disabled=true);

// ====== MAHJONG GAME ENGINE ======
const GAME_STATES = { IDLE:0, PLAYER_TURN:1, AI_TURN:2, ACTION_CHOICE:3, GAME_OVER:4 };
let gameState = GAME_STATES.IDLE;
let gameWall = [];        // remaining draw pile
let gamePlayers = [];     // [{hand, melds, name, isHuman}]
let gameCurrentPlayer = 0; // 0=East, 1=South, 2=West(human), 3=North
let gameLastDiscard = null; // {tileId, fromPlayer}
let gameDiscards = [];    // all discards
let playerDrawnTile = null; // tile just drawn by player
let playerSelected = -1;  // index in hand for discard
let playerActions = [];   // available actions: 'pung','chow','kong','win'

function initGame(){
  // Create wall: 4 copies of each tile
  gameWall = [];
  const totalCopies = 4;
  for(let i=0;i<totalCopies;i++){
    const shuffled = [...TILES].sort(()=>Math.random()-0.5);
    gameWall.push(...shuffled.map(t=>t.id));
  }
  // Shuffle the whole wall
  for(let i=gameWall.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [gameWall[i],gameWall[j]]=[gameWall[j],gameWall[i]];
  }

  // Deal: East=14, others=13
  gamePlayers = [
    {hand:[], melds:[], name:t('oppEast'), isHuman:false},
    {hand:[], melds:[], name:t('oppSouth'), isHuman:false},
    {hand:[], melds:[], name:t('oppWest'), isHuman:true},
    {hand:[], melds:[], name:t('oppNorth'), isHuman:false},
  ];
  for(let p=0;p<4;p++){
    const count = p===0?14:13;
    for(let i=0;i<count;i++) gamePlayers[p].hand.push(gameWall.pop());
  }
  gameCurrentPlayer = 0;
  gameLastDiscard = null;
  gameDiscards = [];
  playerDrawnTile = null;
  playerSelected = -1;
  playerActions = [];
  gameState = GAME_STATES.AI_TURN;

  document.getElementById('game-table').style.display='grid';
  document.getElementById('btn-start-game').style.display='none';
  sortAllHands();
  renderGameBoard();
  setTimeout(()=>aiTurn(0), 600);
}

function sortAllHands(){
  for(const p of gamePlayers){
    p.hand.sort((a,b)=>{
      const ta=TILES[a], tb=TILES[b];
      if(ta.type!==tb.type) return ta.type==='suit'?-1:ta.type==='wind'?(tb.type==='dragon'?-1:1):1;
      if(ta.type==='suit'){if(ta.suit!==tb.suit)return ta.suit-tb.suit;return ta.num-tb.num;}
      return ta.num-tb.num;
    });
  }
}

function renderGameBoard(){
  const me = gamePlayers[2]; // West = human

  // Player hand
  const ph=document.getElementById('player-hand');
  ph.innerHTML = me.hand.map((tid,i)=>{
    const t=TILES[tid];
    const sel = (playerSelected===i && gameState===GAME_STATES.PLAYER_TURN) ? ' selected-tile' : '';
    return `<div class="game-tile ${t.cls}${sel}" onclick="playerClickTile(${i})">${t.face}</div>`;
  }).join('');

  // Drawn tile
  const pd=document.getElementById('player-drawn');
  if(playerDrawnTile!==null){
    const t=TILES[playerDrawnTile];
    pd.style.display='block';
    pd.innerHTML=`<div class="game-drawn ${t.cls}">${t.face}</div>`;
  }else{
    pd.style.display='none';
  }

  // Opponents
  const sides=['top','right','left'];
  const idxs=[0,1,3];
  for(let s=0;s<3;s++){
    const opp=gamePlayers[idxs[s]];
    const tn=document.getElementById('opp-tiles-'+sides[s]);
    tn.innerHTML = opp.hand.map(()=>`<div class="mini-tile"></div>`).join('');
    // Show melds
    const tm=document.getElementById('opp-melds-'+sides[s]);
    tm.innerHTML = opp.melds.map(m=>{
      const tiles=m.tiles.map(tid=>TILES[tid].face).join('');
      return `<div class="game-meld"><span>${tiles}</span></div>`;
    }).join('');
    // Highlight current player
    const nameEl=document.getElementById('opp-name-'+sides[s]);
    nameEl.innerHTML = opp.name + (gameCurrentPlayer===idxs[s]?' ⬅':'');
  }
  // My name
  document.querySelector('#game-bottom .game-player-name').innerHTML =
    t('playerLabel') + (gameCurrentPlayer===2?' ⬅':'');

  // Discards
  const dd=document.getElementById('game-discards');
  dd.innerHTML = gameDiscards.map(tid=>{
    const t=TILES[tid];
    return `<div class="game-dtile ${t.cls}">${t.face}</div>`;
  }).join('') || `<span style="color:var(--text2);font-size:0.85rem">${t('discardHint')}</span>`;

  // Info
  document.getElementById('game-info').textContent = t('tilesLeft').replace('{n}',gameWall.length);

  // Actions
  renderActions();
}

function renderActions(){
  const ac=document.getElementById('game-actions');
  if(gameState===GAME_STATES.PLAYER_TURN && playerDrawnTile!==null){
    ac.innerHTML = `<span style="color:var(--text2);font-size:0.85rem">${t('discardHint2')}</span>`;
  }else if(gameState===GAME_STATES.ACTION_CHOICE){
    let btns='';
    if(playerActions.includes('win')) btns+=`<button class="btn btn-primary" onclick="playerAction('win')">${t('btnWin')}</button>`;
    if(playerActions.includes('pung')) btns+=`<button class="btn btn-primary" onclick="playerAction('pung')">${t('btnPung')}</button>`;
    if(playerActions.includes('chow')) btns+=`<button class="btn btn-primary" onclick="playerAction('chow')">${t('btnChow')}</button>`;
    if(playerActions.includes('kong')) btns+=`<button class="btn btn-primary" onclick="playerAction('kong')">${t('btnKong')}</button>`;
    btns+=`<button class="btn btn-outline" onclick="playerAction('pass')">${t('btnPass')}</button>`;
    ac.innerHTML=btns;
  }else{
    ac.innerHTML='';
  }
}

function playerClickTile(idx){
  if(gameState!==GAME_STATES.PLAYER_TURN) return;
  if(playerDrawnTile===null){
    // Draw phase - click to draw
    drawTile();
    return;
  }
  // Discard phase - select tile to discard
  playerSelected = idx;
  renderGameBoard();
  // Discard after a brief moment so user sees the selection
  setTimeout(()=>{
    if(playerSelected===idx){ // still selected
      discardTile(idx);
    }
  },400);
}

function drawTile(){
  if(gameWall.length===0){endGame(-1);return;}
  playerDrawnTile = gameWall.pop();
  gameState = GAME_STATES.PLAYER_TURN;
  renderGameBoard();
  // Check if can win (tsumo)
  if(checkHandWin(gamePlayers[2].hand.concat([playerDrawnTile]))){
    // Auto-notify but player still needs to discard first (they can keep drawn tile)
  }
}

function discardTile(handIdx){
  const me = gamePlayers[2];
  let discardedId;
  if(playerDrawnTile!==null){
    // Player chose a tile from hand - that's the discard
    discardedId = me.hand[handIdx];
    // Remove from hand, add drawn tile
    me.hand.splice(handIdx,1);
    me.hand.push(playerDrawnTile);
    sortAllHands();
  }else{
    discardedId = me.hand[handIdx];
    me.hand.splice(handIdx,1);
  }
  playerDrawnTile = null;
  playerSelected = -1;
  gameLastDiscard = {tileId: discardedId, fromPlayer: 2};
  gameDiscards.push(discardedId);
  gameState = GAME_STATES.AI_TURN;
  renderGameBoard();

  // Check if any AI can pung/chow/kong/win
  if(checkAllResponses(2)) return; // handled by action choice

  // Next player's turn
  gameCurrentPlayer = (2+1)%4;
  setTimeout(()=>aiTurn(gameCurrentPlayer), 500);
}

function checkAllResponses(fromPlayer){
  const discardedId = gameLastDiscard.tileId;
  const discardedTile = TILES[discardedId];

  // Check in turn order starting from next player
  for(let i=1;i<=3;i++){
    const pIdx = (fromPlayer + i) % 4;
    const p = gamePlayers[pIdx];
    if(p.isHuman) continue; // handled separately

    // Check win
    if(checkHandWin(p.hand.concat([discardedId]))){
      gameCurrentPlayer = pIdx;
      if(pIdx===2){
        offerPlayerActions(discardedId);
        return true;
      }else{
        setTimeout(()=>{p.hand.push(discardedId); endGame(pIdx);}, 400);
        return true;
      }
    }
  }

  // Check pung/kong/chow for next player only (in real mahjong, chow is only from previous)
  const nextP = (fromPlayer + 1) % 4;
  const np = gamePlayers[nextP];
  if(!np.isHuman){
    const actions = getAIActions(np, discardedId, fromPlayer);
    if(actions.length>0){
      gameCurrentPlayer = nextP;
      const action = actions[0]; // AI picks best action
      setTimeout(()=>executeAIAction(np, nextP, action, discardedId), 400);
      return true;
    }
  }else{
    const actions = getAIActions(np, discardedId, fromPlayer);
    if(actions.length>0){
      gameCurrentPlayer = 2;
      offerPlayerActions(discardedId);
      return true;
    }
  }

  return false;
}

function offerPlayerActions(discardedId){
  const me = gamePlayers[2];
  playerActions = [];
  const dt = TILES[discardedId];

  // Check win
  if(checkHandWin(me.hand.concat([discardedId]))) playerActions.push('win');

  // Check pung (2+ identical in hand)
  const sameInHand = me.hand.filter(tid=>TILES[tid].key===dt.key).length;
  if(sameInHand>=2) playerActions.push('pung');

  // Check kong (3 identical)
  if(sameInHand>=3) playerActions.push('kong');

  // Check chow (only from previous player = 3, North)
  if(gameLastDiscard.fromPlayer===3 && dt.type==='suit'){
    const s=dt.suit, n=dt.num;
    const has = (sn, nn)=>me.hand.some(tid=>{
      const t=TILES[tid]; return t.type==='suit'&&t.suit===sn&&t.num===nn;
    });
    if(has(s,n+1)&&has(s,n+2)) playerActions.push('chow');
    if(has(s,n-1)&&has(s,n+1)) playerActions.push('chow');
    if(has(s,n-2)&&has(s,n-1)) playerActions.push('chow');
  }

  if(playerActions.length>0){
    gameState = GAME_STATES.ACTION_CHOICE;
    renderGameBoard();
  }else{
    // No actions, next player
    gameCurrentPlayer = (2+1)%4;
    gameState = GAME_STATES.AI_TURN;
    renderGameBoard();
    setTimeout(()=>aiTurn(gameCurrentPlayer), 500);
  }
}

function playerAction(action){
  if(gameState!==GAME_STATES.ACTION_CHOICE) return;
  const me = gamePlayers[2];
  const discardedId = gameLastDiscard.tileId;
  const dt = TILES[discardedId];

  if(action==='win'){
    me.hand.push(discardedId);
    gameDiscards.pop(); // remove from discard pool
    endGame(2);
    return;
  }
  if(action==='pung'){
    // Remove 2 identical from hand, add all 3 as meld
    let removed=0;
    me.hand = me.hand.filter(tid=>{
      if(removed<2 && TILES[tid].key===dt.key){removed++;return false;}
      return true;
    });
    me.melds.push({type:'pung',tiles:[discardedId,discardedId,discardedId]});
    gameDiscards.pop();
  }
  if(action==='kong'){
    let removed=0;
    me.hand = me.hand.filter(tid=>{
      if(removed<3 && TILES[tid].key===dt.key){removed++;return false;}
      return true;
    });
    me.melds.push({type:'kong',tiles:[discardedId,discardedId,discardedId,discardedId]});
    gameDiscards.pop();
    // Draw replacement tile
    if(gameWall.length>0) me.hand.push(gameWall.pop());
  }
  if(action==='chow'){
    const s=dt.suit, n=dt.num;
    // Find which chow pattern works
    const patterns=[[n,n+1,n+2],[n-1,n,n+1],[n-2,n-1,n]];
    for(const pat of patterns){
      if(pat[0]<1||pat[2]>9) continue;
      const needed = pat.filter(x=>x!==n);
      const found=[];
      me.hand = me.hand.filter(tid=>{
        const t=TILES[tid];
        if(found.length<2 && t.type==='suit' && t.suit===s && needed.includes(t.num) && !found.includes(t.num)){
          found.push(t.num);
          return false;
        }
        return true;
      });
      if(found.length===2){
        const allTiles = pat.map(num=>{
          if(num===n) return discardedId;
          return TILES.find(t=>t.type==='suit'&&t.suit===s&&t.num===num).id;
        });
        me.melds.push({type:'chow',tiles:allTiles});
        gameDiscards.pop();
        break;
      }
    }
  }
  if(action==='pass'){
    // fall through
  }

  playerActions=[];
  gameState=GAME_STATES.AI_TURN;
  gameCurrentPlayer=(2+1)%4;
  sortAllHands();
  renderGameBoard();
  setTimeout(()=>aiTurn(gameCurrentPlayer), 500);
}

function getAIActions(player, discardedId, fromPlayer){
  const actions=[];
  const dt=TILES[discardedId];
  const sameInHand=player.hand.filter(tid=>TILES[tid].key===dt.key).length;

  if(checkHandWin(player.hand.concat([discardedId]))) actions.push('win');
  if(sameInHand>=3) actions.push('kong');
  if(sameInHand>=2) actions.push('pung');
  if(dt.type==='suit' && (fromPlayer+1)%4===gamePlayers.indexOf(player)){
    const s=dt.suit,n=dt.num;
    const has=(sn,nn)=>player.hand.some(tid=>{const t=TILES[tid];return t.type==='suit'&&t.suit===sn&&t.num===nn;});
    if(has(s,n+1)&&has(s,n+2)) actions.push('chow');
    if(has(s,n-1)&&has(s,n+1)) actions.push('chow');
    if(has(s,n-2)&&has(s,n-1)) actions.push('chow');
  }
  return actions;
}

function executeAIAction(player, pIdx, action, discardedId){
  const dt=TILES[discardedId];
  if(action==='win'){
    player.hand.push(discardedId);
    gameDiscards.pop();
    endGame(pIdx);
    return;
  }
  if(action==='pung'){
    let r=0;
    player.hand=player.hand.filter(tid=>{if(r<2&&TILES[tid].key===dt.key){r++;return false;}return true;});
    player.melds.push({type:'pung',tiles:[discardedId,discardedId,discardedId]});
    gameDiscards.pop();
  }
  if(action==='kong'){
    let r=0;
    player.hand=player.hand.filter(tid=>{if(r<3&&TILES[tid].key===dt.key){r++;return false;}return true;});
    player.melds.push({type:'kong',tiles:[discardedId,discardedId,discardedId,discardedId]});
    gameDiscards.pop();
    if(gameWall.length>0) player.hand.push(gameWall.pop());
  }
  if(action==='chow'){
    const s=dt.suit,n=dt.num;
    const patterns=[[n,n+1,n+2],[n-1,n,n+1],[n-2,n-1,n]];
    for(const pat of patterns){
      if(pat[0]<1||pat[2]>9) continue;
      const needed=pat.filter(x=>x!==n);
      const found=[];
      player.hand=player.hand.filter(tid=>{
        const t=TILES[tid];
        if(found.length<2&&t.type==='suit'&&t.suit===s&&needed.includes(t.num)&&!found.includes(t.num)){found.push(t.num);return false;}
        return true;
      });
      if(found.length===2){
        const allTiles=pat.map(num=>num===n?discardedId:TILES.find(t=>t.type==='suit'&&t.suit===s&&t.num===num).id);
        player.melds.push({type:'chow',tiles:allTiles});
        gameDiscards.pop();break;
      }
    }
  }

  sortAllHands();
  renderGameBoard();
  // AI still needs to discard one tile
  setTimeout(()=>aiDiscard(player,pIdx), 500);
}

function aiTurn(pIdx){
  if(gameState===GAME_STATES.GAME_OVER) return;
  const player=gamePlayers[pIdx];
  if(player.isHuman){
    // Player's turn
    gameCurrentPlayer=2;
    gameState=GAME_STATES.PLAYER_TURN;
    playerDrawnTile=null;
    playerSelected=-1;
    document.getElementById('game-info').textContent=t('yourTurn');
    renderGameBoard();
    return;
  }

  gameCurrentPlayer=pIdx;
  document.getElementById('game-info').textContent=t('aiThinking').replace('{name}',player.name);
  renderGameBoard();

  // AI draws
  if(gameWall.length===0){endGame(-1);return;}
  const drawnId=gameWall.pop();
  player.hand.push(drawnId);

  // Check win (tsumo)
  if(checkHandWin(player.hand)){
    setTimeout(()=>endGame(pIdx), 500);
    return;
  }

  // AI discards - find worst tile
  setTimeout(()=>aiDiscard(player,pIdx), 600);
}

function aiDiscard(player,pIdx){
  // Simple AI: discard tile least likely to form meld
  // Priority: discard isolated tiles (no neighbors, no pair)
  const hand=player.hand.slice();
  sortAllHands();

  // Score each tile: higher = keep
  const scores=hand.map((tid,i)=>{
    const t=TILES[tid];
    let score=0;
    // Pair bonus
    const sameCount=hand.filter(ot=>TILES[ot].key===t.key).length;
    if(sameCount>=3) score+=10;
    else if(sameCount===2) score+=6;

    // Adjacent bonus (suits only)
    if(t.type==='suit'){
      const has=(sn,nn)=>hand.some(ot=>{const o=TILES[ot];return o.type==='suit'&&o.suit===sn&&o.num===nn;});
      // Check neighbors
      let neighbors=0;
      if(has(t.suit,t.num-1)) neighbors++;
      if(has(t.suit,t.num+1)) neighbors++;
      if(has(t.suit,t.num-2)) neighbors+=0.5;
      if(has(t.suit,t.num+2)) neighbors+=0.5;
      score+=neighbors*3;
    }else{
      // Honors: keep if pair or triplet
      score+=sameCount*2;
    }
    return {idx:i, score};
  });

  scores.sort((a,b)=>a.score-b.score);
  const discardIdx=scores[0].idx;
  const discardedId=hand[discardIdx];
  player.hand.splice(discardIdx,1);
  gameLastDiscard={tileId:discardedId,fromPlayer:pIdx};
  gameDiscards.push(discardedId);
  sortAllHands();
  renderGameBoard();

  // Check if other players can respond
  if(checkAllResponses(pIdx)) return;

  // Next player
  gameCurrentPlayer=(pIdx+1)%4;
  gameState=GAME_STATES.AI_TURN;
  setTimeout(()=>aiTurn(gameCurrentPlayer), 500);
}

function checkHandWin(hand){
  if(hand.length!==14) return false;
  const count=new Map();
  hand.forEach(tid=>{
    const t=TILES[tid];
    const key=t.type==='suit'?'s'+t.suit+'n'+t.num:'t'+t.type+'v'+t.num;
    count.set(key,(count.get(key)||0)+1);
  });
  const keys=Array.from(count.keys());
  for(const pk of keys){
    if(count.get(pk)<2) continue;
    const r=new Map(count);
    const v=r.get(pk);
    if(v===2)r.delete(pk);else r.set(pk,v-2);
    if(canFormMelds(r,4)) return true;
  }
  return false;
}

function endGame(winnerIdx){
  gameState=GAME_STATES.GAME_OVER;
  const info=document.getElementById('game-info');
  if(winnerIdx===-1){
    info.textContent=t('drawGame');
  }else if(winnerIdx===2){
    info.textContent=t('youWin');
  }else{
    info.textContent=t('aiWin').replace('{name}',gamePlayers[winnerIdx].name);
  }
  document.getElementById('player-drawn').style.display='none';
  document.getElementById('game-actions').innerHTML='';
  document.getElementById('btn-start-game').style.display='inline-block';
  document.getElementById('btn-start-game').textContent='🔄 再来一局';
  renderGameBoard();
}

function startGame(){
  initGame();
}
